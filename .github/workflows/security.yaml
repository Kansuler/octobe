name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run govulncheck
        run: |
          set +e
          go run golang.org/x/vuln/cmd/govulncheck@latest ./... | tee govulncheck.txt
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## govulncheck"
            echo
            echo '```text'
            cat govulncheck.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
