name: Renovate

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate dependency updates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check GitHub App credentials
        env:
          RENOVATE_CLIENT_ID: ${{ vars.RENOVATE_CLIENT_ID }}
          RENOVATE_APP_PRIVATE_KEY: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$RENOVATE_CLIENT_ID" ]; then
            echo "::error::Set a RENOVATE_CLIENT_ID repository variable with the GitHub App ID."
            exit 1
          fi
          if [ -z "$RENOVATE_APP_PRIVATE_KEY" ]; then
            echo "::error::Set a RENOVATE_APP_PRIVATE_KEY repository secret with the GitHub App private key."
            exit 1
          fi

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.7
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: info
          RENOVATE_ONBOARDING: "false"
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: enabled
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_REQUIRE_CONFIG: required
